<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Dark navy/indigo background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E2235"/>
      <stop offset="50%" stop-color="#171B2C"/>
      <stop offset="100%" stop-color="#111524"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-15%" y="-10%" width="130%" height="135%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#060818" flood-opacity="0.6"/>
    </filter>

    <!-- Ambient glow behind mark -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22"/>
    </filter>

    <!-- Squircle clip for glass layers -->
    <clipPath id="sqClip">
      <path d="M256 10C382 10 430 10 466 46C502 82 502 130 502 256C502 382 502 430 466 466C430 502 382 502 256 502C130 502 82 502 46 466C10 430 10 382 10 256C10 130 10 82 46 46C82 10 130 10 256 10Z"/>
    </clipPath>

    <!-- Convex dome -->
    <radialGradient id="dome" cx="0.5" cy="0.35" r="0.65" fx="0.5" fy="0.3">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.07"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.12"/>
    </radialGradient>

    <!-- Top specular band -->
    <linearGradient id="specBand" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="10%" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="30%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.03"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Diagonal sheen -->
    <linearGradient id="sheen" x1="0" y1="0" x2="0.7" y2="0.7">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.09"/>
      <stop offset="35%" stop-color="#FFFFFF" stop-opacity="0.03"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Rim highlight -->
    <linearGradient id="rimTop" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="30%" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Bottom vignette -->
    <radialGradient id="vignette" cx="0.5" cy="1" r="0.6" fx="0.5" fy="0.95">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>

    <!-- Inner bevel highlight -->
    <filter id="bevel" x="-2%" y="-2%" width="104%" height="104%">
      <feMorphology in="SourceAlpha" operator="erode" radius="1.5" result="eroded"/>
      <feOffset in="SourceAlpha" dx="-1.5" dy="-1.5" result="shiftLight"/>
      <feOffset in="SourceAlpha" dx="1.5" dy="1.5" result="shiftDark"/>
      <feComposite in="shiftLight" in2="eroded" operator="out" result="lightEdge"/>
      <feComposite in="shiftDark" in2="eroded" operator="out" result="darkEdge"/>
      <feFlood flood-color="#FFFFFF" flood-opacity="0.3" result="white"/>
      <feComposite in="white" in2="lightEdge" operator="in" result="highlight"/>
      <feFlood flood-color="#000000" flood-opacity="0.25" result="black"/>
      <feComposite in="black" in2="darkEdge" operator="in" result="lowlight"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="highlight"/>
        <feMergeNode in="lowlight"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ==================== BACKGROUND ==================== -->
  <path d="M256 10C382 10 430 10 466 46C502 82 502 130 502 256C502 382 502 430 466 466C430 502 382 502 256 502C130 502 82 502 46 466C10 430 10 382 10 256C10 130 10 82 46 46C82 10 130 10 256 10Z" fill="url(#bg)"/>

  <!-- ==================== GLASS EFFECT LAYERS ==================== -->
  <g clip-path="url(#sqClip)">
    <rect x="10" y="10" width="492" height="492" fill="url(#dome)"/>
    <ellipse cx="256" cy="130" rx="300" ry="180" fill="url(#specBand)"/>
    <ellipse cx="200" cy="90" rx="80" ry="45" fill="#FFFFFF" opacity="0.08" filter="url(#glassBlur)"/>
    <rect x="10" y="10" width="492" height="492" fill="url(#sheen)"/>
    <rect x="10" y="10" width="492" height="492" fill="url(#vignette)"/>
    <path d="M256 14C380 14 426 14 461 49C496 84 496 132 496 256C496 380 496 426 461 461C426 496 380 496 256 496C132 496 84 496 49 461C14 426 14 380 14 256C14 132 14 84 49 49C84 14 132 14 256 14Z"
          fill="none" stroke="url(#rimTop)" stroke-width="1.2"/>
    <path d="M256 18C376 18 422 18 456 52C492 88 492 136 492 256C492 376 492 422 456 456C422 492 376 492 256 492C136 492 88 492 52 456C18 422 18 376 18 256C18 136 18 88 52 52C88 18 136 18 256 18Z"
          fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.06"/>
  </g>

  <!-- ==================== AMBIENT GLOW ==================== -->
  <g opacity="0.15" filter="url(#glow)">
    <svg x="116" y="164" width="280" height="177.3" viewBox="0 0 1385.7 877.37" overflow="visible">
      <path fill="#0EA5E9"
        d="M6.32,0S0,633,0,706.33c0,136.84,34.2,171.04,171.04,171.04h246.77c159.4,0,198.19-30.94,275.04-106.36,76.89,75.42,115.65,106.36,275.04,106.36h246.76c136.84,0,171.04-34.2,171.04-171.04,0-73.29-6.32-706.33-6.32-706.33-54.23,37.03-528.76,442.03-611.07,496.49l171.04,168.58,266.76-368s8.55,365.24,8.55,377.45c0,24.42-9.78,34.2-34.2,34.2,0,0,41.52,0-124.6,0-178.36,0-195.46-9.78-271.22-83.08-36.66-36.66-64.94-66.91-91.79-91.33-26.85,24.42-55.16,54.7-91.79,91.33-75.76,73.29-92.86,83.08-271.22,83.08-166.15,0-124.6,0-124.6,0-24.42,0-34.2-9.78-34.2-34.2,0-12.21,8.55-377.45,8.55-377.45l266.76,368,171.04-168.58C535.08,442.03,60.55,37.03,6.32,0h0Z"/>
    </svg>
  </g>

  <!-- ==================== MAIN M MARK (from Asset 1.svg) ==================== -->
  <g filter="url(#shadow)">
    <g filter="url(#bevel)">
      <!-- Nested SVG preserves original coordinate system for gradients -->
      <svg x="116" y="164" width="280" height="177.3" viewBox="0 0 1385.7 877.37" overflow="visible">
        <defs>
          <!-- Original gradients from the exported SVG -->
          <linearGradient id="mk-grad1" x1="195.82" y1="861.73" x2="916.71" y2="861.73" gradientTransform="translate(494.64 -104.11)" gradientUnits="userSpaceOnUse">
            <stop offset=".18" stop-color="#fff"/>
            <stop offset=".22" stop-color="#ebebeb"/>
            <stop offset=".42" stop-color="#989898"/>
            <stop offset=".60" stop-color="#575757"/>
            <stop offset=".75" stop-color="#272727"/>
            <stop offset=".87" stop-color="#0a0a0a"/>
            <stop offset=".93" stop-color="#000"/>
          </linearGradient>
          <linearGradient id="mk-grad2" x1="124.85" y1="811.06" x2="-549.19" y2="995.8" xlink:href="#mk-grad1"/>
        </defs>

        <!-- Layer 1: White M shape -->
        <path fill="#FFFFFF"
          d="M6.32,0S0,633,0,706.33c0,136.84,34.2,171.04,171.04,171.04h246.77c159.4,0,198.19-30.94,275.04-106.36,76.89,75.42,115.65,106.36,275.04,106.36h246.76c136.84,0,171.04-34.2,171.04-171.04,0-73.29-6.32-706.33-6.32-706.33-54.23,37.03-528.76,442.03-611.07,496.49l171.04,168.58,266.76-368s8.55,365.24,8.55,377.45c0,24.42-9.78,34.2-34.2,34.2,0,0,41.52,0-124.6,0-178.36,0-195.46-9.78-271.22-83.08-36.66-36.66-64.94-66.91-91.79-91.33-26.85,24.42-55.16,54.7-91.79,91.33-75.76,73.29-92.86,83.08-271.22,83.08-166.15,0-124.6,0-124.6,0-24.42,0-34.2-9.78-34.2-34.2,0-12.21,8.55-377.45,8.55-377.45l266.76,368,171.04-168.58C535.08,442.03,60.55,37.03,6.32,0h0Z"/>

        <!-- Layer 2: Right gradient shadow (multiply blend) -->
        <path fill="url(#mk-grad1)" fill-rule="evenodd" style="mix-blend-mode:multiply"
          d="M708.56,637.86c-.57,57.39-5.72,101.67-18.1,135.51.8-.8,1.6-1.56,2.43-2.36,76.89,75.42,115.65,106.36,275.04,106.36h78.12c117.48-12.04,158.07-59.79,166.22-185.51-4.23,11.88-14.24,16.93-31.77,16.93,0,0,41.52,0-124.6,0s-192.9-8.65-258.44-70.8h-55.49c-11.61,0-22.72-.03-33.4-.1v-.03Z"/>

        <!-- Layer 3: Left gradient shadow (multiply blend) -->
        <path fill="url(#mk-grad2)" fill-rule="evenodd" style="mix-blend-mode:multiply"
          d="M690.46,773.37c12.38-33.84,17.53-78.12,18.1-135.51,10.68.07,21.83.1,33.4.1h55.49c-2.26-2.16-4.59-4.36-6.95-6.65-38.43,2.46-85.3,3.19-144.56,3.19h-54.03c-68.3,65.28-91.09,74.26-262.07,74.26s-124.6,0-124.6,0c-18.2,0-28.28-5.42-32.21-18.3,10.65,147.65,68.9,186.71,244.3,186.71h20.49c141.27-2.56,180.62-33.34,252.62-103.8Z"/>

        <!-- Layer 4: Cyan accent curve -->
        <path fill="#1ca9e8" fill-rule="evenodd" style="mix-blend-mode:multiply"
          d="M1212.26,691.85c-8.15,125.73-48.74,173.47-166.22,185.52h-78.11c-38.6,0-70.13-1.82-96.84-5.64-83.57-11.96-119.94-43.58-178.21-100.73t-.02.01h0c-.4.39-.8.78-1.2,1.17-.4.39-.8.78-1.19,1.16-1.13,1.11-2.25,2.2-3.36,3.29-1.62,1.59-3.23,3.15-4.82,4.68-1.15,1.12-2.3,2.22-3.43,3.31-3.46,3.33-6.85,6.55-10.19,9.67-1.06.99-2.11,1.97-3.16,2.93-.77.72-1.55,1.43-2.32,2.14-6.97,6.38-13.76,12.32-20.55,17.84-.92.76-1.84,1.5-2.77,2.24-2.96,2.36-5.92,4.64-8.89,6.83-.52.4-1.05.78-1.58,1.17-.52.38-1.03.75-1.55,1.12-.82.59-1.64,1.18-2.47,1.75-.92.65-1.84,1.29-2.77,1.92-.26.18-.52.35-.78.53-.62.43-1.25.85-1.88,1.26-.51.35-1.03.69-1.55,1.02-.68.45-1.36.89-2.05,1.33-.17.11-.35.22-.53.33-.79.51-1.58,1-2.38,1.5-.45.27-.89.54-1.34.82-.74.45-1.49.9-2.24,1.34-1.06.63-2.12,1.25-3.19,1.86-3.21,1.83-6.47,3.58-9.79,5.26-37.7,19-83.99,28.32-159.04,29.69h-20.49c-175.4,0-233.66-39.06-244.31-186.72.05.17.1.33.16.49,0,.02,0,.04.02.06.08.26.16.51.26.76.08.26.18.52.28.77.09.25.19.5.3.74.2.49.41.97.65,1.44.1.23.22.46.35.69.34.68.73,1.33,1.15,1.96.12.21.26.42.42.62,4.98,7.12,13.56,10.43,26.53,10.74h126.69c178.36,0,195.46-9.78,271.21-83.08,36.64-36.63,64.95-66.9,91.8-91.32,26.85,24.42,55.13,54.66,91.79,91.32,1.99,1.93,3.95,3.81,5.86,5.66,70.91,68.15,91.69,77.42,265.36,77.42h128.05c15.43-.64,24.41-5.79,28.35-16.87Z"/>
      </svg>
    </g>
  </g>

  <!-- ==================== SPECULAR HIGHLIGHTS ==================== -->
  <!-- Bright specular on upper-left wing -->
  <g opacity="0.12">
    <svg x="116" y="164" width="280" height="177.3" viewBox="0 0 1385.7 877.37" overflow="visible">
      <path fill="#FFFFFF"
        d="M6.32,0S0,633,0,706.33c0,136.84,34.2,171.04,171.04,171.04h246.77c159.4,0,198.19-30.94,275.04-106.36l-171.04-168.58-266.76,368S0.8,593.18.8,580.97C.8,556.55,10.58,546.77,35,546.77c0,0-41.52,0,124.6,0,178.36,0,195.46,9.78,271.22,83.08,36.63,36.63,64.94,66.91,91.79,91.33L535.08,442.03C535.08,442.03,60.55,37.03,6.32,0h0Z"/>
    </svg>
  </g>
</svg>
